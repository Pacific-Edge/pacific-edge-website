<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Login | Pacific Edge AI</title>
<meta name="description" content="Sign in to your Pacific Edge AI client dashboard.">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--radius:4px;
  --bg:#f4f1ea;--bg2:#ece7db;--card:#ffffff;--border:rgba(28,25,20,0.12);
  --border-a:rgba(74,240,192,0.32);--text:#1e1b16;--text2:rgba(30,27,22,0.62);
  --text3:rgba(30,27,22,0.40);--accent:#4af0c0;--accent-ink:#0a7d5d;--accent-bright:#0a9d76;--on-accent:#04130f;--accent2:#c75d3c;--glow:rgba(74,240,192,0.18);
  --display:'Bebas Neue',sans-serif;--body:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace;
}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--body);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden;-webkit-font-smoothing:antialiased}
.bg-grid{position:fixed;inset:0;background-image:radial-gradient(circle,rgba(28,25,20,.05) 1px,transparent 1px);background-size:34px 34px;opacity:.5;pointer-events:none}
.orb{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none}
.orb-1{width:520px;height:520px;background:rgba(74,240,192,.12);top:-200px;right:-160px}
.orb-2{width:460px;height:460px;background:rgba(199,93,60,.10);bottom:-200px;left:-180px}
::selection{background:var(--accent);color:var(--on-accent)}

.auth{position:relative;z-index:2;width:100%;max-width:430px}
.auth-logo{display:flex;align-items:center;gap:0;justify-content:center;font-weight:700;font-size:19px;letter-spacing:-.3px;color:var(--text);text-decoration:none;margin-bottom:26px}
.auth-logo .ai{color:var(--accent-bright)}
.nav-slash{display:flex;gap:3px;margin-right:9px}
.nav-slash i{display:block;width:3px;height:17px;border-radius:var(--radius);background:var(--accent-bright);transform:rotate(15deg)}
.nav-slash i:nth-child(2){opacity:.6}.nav-slash i:nth-child(3){opacity:.45}

.auth-card{background:linear-gradient(165deg,#ffffff,#fbf8f1);border:1px solid var(--border);border-radius:var(--radius);padding:42px 38px 36px;box-shadow:0 40px 90px -42px rgba(28,25,20,.28),0 0 0 1px rgba(28,25,20,.02)}
.auth-badge{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--accent-ink);padding:6px 13px;border:1px solid var(--border-a);border-radius:var(--radius);margin-bottom:20px;background:rgba(74,240,192,.05)}
.auth-badge i{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent)}
.auth-card h1{font-family:var(--display);font-weight:400;font-size:46px;letter-spacing:1px;text-transform:uppercase;line-height:.95;margin-bottom:10px}
.auth-card h1 .a{color:var(--accent-ink)}
.auth-sub{color:var(--text2);font-size:14.5px;line-height:1.6;font-weight:300;margin-bottom:26px}

.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:500;letter-spacing:.3px;color:var(--text2);margin-bottom:7px}
.field-wrap{position:relative}
.field input{width:100%;background:#f6f2ea;border:1px solid var(--border);border-radius:var(--radius);padding:14px 15px;color:var(--text);font-family:var(--body);font-size:15px;transition:border-color .25s,box-shadow .25s}
.field input::placeholder{color:var(--text3)}
.field input:focus{outline:none;border-color:var(--border-a);box-shadow:0 0 0 3px rgba(74,240,192,.10)}
.toggle-pw{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;padding:8px 10px;transition:color .25s}
.toggle-pw:hover{color:var(--accent-ink)}

.row-between{display:flex;align-items:center;justify-content:space-between;margin:6px 0 22px}
.remember{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);cursor:pointer;user-select:none}
.remember input{width:15px;height:15px;accent-color:var(--accent)}
.forgot{font-size:13px;color:var(--text3);text-decoration:none;transition:color .25s}
.forgot:hover{color:var(--accent-ink)}

.btn{width:100%;display:inline-flex;align-items:center;justify-content:center;gap:9px;padding:15px;background:var(--accent);color:var(--on-accent);font-family:var(--body);font-weight:700;font-size:15px;border:none;border-radius:var(--radius);cursor:pointer;transition:transform .25s,box-shadow .25s}
.btn:hover{transform:translateY(-2px);box-shadow:0 0 40px var(--glow)}
.btn .arr{transition:transform .25s}
.btn:hover .arr{transform:translateX(4px)}

.err{display:none;align-items:center;gap:8px;background:rgba(207,68,68,.10);border:1px solid rgba(207,68,68,.28);color:#cf4444;font-size:13px;padding:11px 14px;border-radius:var(--radius);margin-bottom:16px}
.err.show{display:flex}

.demo-hint{margin-top:18px;text-align:center;font-size:12.5px;color:var(--text3);line-height:1.6}
.demo-hint button{background:none;border:none;color:var(--accent-ink);font-family:var(--body);font-size:12.5px;cursor:pointer;text-decoration:underline;text-underline-offset:2px;padding:0}
.divider{display:flex;align-items:center;gap:14px;margin:26px 0 20px;color:var(--text3);font-size:11px;font-family:var(--mono);letter-spacing:1px;text-transform:uppercase}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.auth-foot{text-align:center;font-size:13.5px;color:var(--text2)}
.auth-foot a{color:var(--accent-ink);text-decoration:none;font-weight:500}
.auth-foot a:hover{text-decoration:underline}
.back-link{display:block;text-align:center;margin-top:24px;font-size:13px;color:var(--text3);text-decoration:none;transition:color .25s}
.back-link:hover{color:var(--accent-ink)}
@media(max-width:480px){.auth-card{padding:34px 24px 30px}.auth-card h1{font-size:40px}}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="auth">
<a href="index.html" class="auth-logo"><span class="nav-slash"><i></i><i></i><i></i></span>pacific<span class="ai">edge.ai</span></a>
<div class="auth-card">
<div class="auth-badge"><i></i>Client Portal</div>
<h1>Welcome <span class="a">Back.</span></h1>
<p class="auth-sub">Sign in to view your live dashboard. Every call, review, and booking, tracked in one place.</p>

<div class="err" id="err"><span>&#9888;</span><span id="errMsg">Please check your details.</span></div>

<form id="loginForm" novalidate>
<div class="field">
<label for="email">Email</label>
<div class="field-wrap"><input type="email" id="email" name="email" placeholder="you@yourbusiness.com" autocomplete="username"></div>
</div>
<div class="field">
<label for="password">Password</label>
<div class="field-wrap">
<input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password">
<button type="button" class="toggle-pw" id="togglePw" aria-label="Show password">Show</button>
</div>
</div>
<div class="row-between">
<label class="remember"><input type="checkbox" id="remember" checked>Remember me</label>
<a href="https://cal.com/pacificedge" target="_blank" rel="noopener" class="forgot">Need help?</a>
</div>
<button type="submit" class="btn">Sign in<span class="arr">&rarr;</span></button>
</form>

<div class="demo-hint"><button type="button" id="demoBtn">Fill demo login</button></div>

<div class="divider">Not a client yet</div>
<p class="auth-foot">Want a dashboard like this? <a href="https://cal.com/pacificedge" target="_blank" rel="noopener">Book a free call</a></p>
</div>
<a href="index.html" class="back-link">&larr; Back to pacificedge.ai</a>
</div>

<script>
(function () {
  'use strict';
  var form = document.getElementById('loginForm');
  var email = document.getElementById('email');
  var pw = document.getElementById('password');
  var err = document.getElementById('err');
  var errMsg = document.getElementById('errMsg');
  var toggle = document.getElementById('togglePw');
  var demoBtn = document.getElementById('demoBtn');
  var remember = document.getElementById('remember');

  // If already signed in, go straight to the dashboard.
  try { if (localStorage.getItem('pe_client')) { window.location.replace('app.html'); } } catch (e) {}

  function showError(msg) {
    errMsg.textContent = msg;
    err.classList.add('show');
  }

  function niceName(addr) {
    var local = (addr.split('@')[0] || 'there').replace(/[._-]+/g, ' ').trim();
    return local.split(' ').map(function (w) {
      return w ? w.charAt(0).toUpperCase() + w.slice(1) : w;
    }).join(' ') || 'there';
  }

  toggle.addEventListener('click', function () {
    if (pw.type === 'password') { pw.type = 'text'; toggle.textContent = 'Hide'; }
    else { pw.type = 'password'; toggle.textContent = 'Show'; }
  });

  demoBtn.addEventListener('click', function () {
    email.value = 'demo@pacificedge.ai';
    pw.value = 'demo1234';
    err.classList.remove('show');
    pw.focus();
  });

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    err.classList.remove('show');
    var addr = email.value.trim();
    var pass = pw.value;
    if (addr.indexOf('@') < 1 || addr.indexOf('.') < 0) { showError('Please enter a valid email address.'); email.focus(); return; }
    if (pass.length < 4) { showError('Please enter your password (at least 4 characters).'); pw.focus(); return; }
    // Front-end demo only: store a lightweight session and open the dashboard.
    var session = { email: addr, name: niceName(addr), business: 'Your Business', since: Date.now() };
    try {
      var store = remember.checked ? localStorage : sessionStorage;
      store.setItem('pe_client', JSON.stringify(session));
      // mirror to localStorage so app.html guard finds it either way
      localStorage.setItem('pe_client', JSON.stringify(session));
    } catch (e2) {}
    window.location.href = 'app.html';
  });
})();
</script>
<script src="vendor/lenis.min.js"></script>
<script src="smooth-scroll.js"></script>
</body>
</html>
